version: '3.8'

services:
  # Cache Redis
  cache:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASS:-123456}
    command: redis-server --requirepass ${REDIS_PASS:-123456}
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Banco PostgreSQL
  db_postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-codatende_db}
      POSTGRES_USER: ${DB_USER:-codatende_user}
      POSTGRES_PASSWORD: ${DB_PASS:-SuaSenhaSegura123!}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-codatende_user} -d ${DB_NAME:-codatende_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Migração do Banco
  db_migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DB_DIALECT=${DB_DIALECT:-postgres}
      - DB_HOST=db_postgres
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-codatende_db}
      - DB_USER=${DB_USER:-codatende_user}
      - DB_PASS=${DB_PASS:-SuaSenhaSegura123!}
      - DB_DEBUG=${DB_DEBUG:-false}
    depends_on:
      db_postgres:
        condition: service_healthy
    networks:
      - app_network
    command: ["npm", "run", "db:migrate"]

  # Backend Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_DIALECT=${DB_DIALECT:-postgres}
      - DB_HOST=db_postgres
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-codatende_db}
      - DB_USER=${DB_USER:-codatende_user}
      - DB_PASS=${DB_PASS:-SuaSenhaSegura123!}
      - DB_DEBUG=${DB_DEBUG:-false}
      - REDIS_URI=redis://:${REDIS_PASS:-123456}@cache:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:8080}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - PORT=${PORT:-8080}
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      db_postgres:
        condition: service_healthy
      cache:
        condition: service_healthy
      db_migrate:
        condition: service_completed_successfully
    networks:
      - app_network
    volumes:
      - ./backend/public:/app/public

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=${BACKEND_URL:-http://localhost:8080}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  postgres_data:
  redis_data:

networks:
  app_network:
    driver: bridge